AWSTemplateFormatVersion: '2010-09-09'
Description: 'webapp - Compute layer: EC2 x2, ALB, ACM Certificate, Route53 Record'

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, prod]

  NetworkingStackName:
    Type: String
    Description: e.g. dev-webapp-networking

  SecurityStackName:
    Type: String
    Description: e.g. dev-webapp-security

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small, t3.medium, t3.large]
    ConstraintDescription: Must be a valid EC2 instance type

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Auto-resolved latest Amazon Linux 2023 AMI

  SubDomain:
    Type: String
    Default: sampleproject
    Description: Subdomain prefix — result will be {SubDomain}.{HostedZoneName}

  HostedZoneName:
    Type: String
    Default: cloudmentor-pro.click
    Description: Root domain (hosted zone must already exist)

  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID for the root domain

Resources:

  # ── ACM Certificate (DNS validation — auto creates CNAME via Route53) ──────
  AcmCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub '${SubDomain}.${HostedZoneName}'
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub '${SubDomain}.${HostedZoneName}'
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - { Key: Name,        Value: !Sub '${Environment}-webapp-cert-${SubDomain}' }
        - { Key: Environment, Value: !Ref Environment }
        - { Key: Project,     Value: webapp }
        - { Key: ManagedBy,   Value: CloudFormation }
        - { Key: Layer,       Value: compute }

  # ── EC2 Instances (private subnets, SSM access only) ──────────────────────
  Ec2WebServer1a:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile:
        Fn::ImportValue: !Sub '${SecurityStackName}-IamInstanceProfileEc2Name'
      SubnetId:
        Fn::ImportValue: !Sub '${NetworkingStackName}-SubnetPrivate1aId'
      SecurityGroupIds:
        - Fn::ImportValue: !Sub '${SecurityStackName}-SecurityGroupEc2Id'
      # No KeyName — access via SSM Session Manager only
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>${Environment} | webapp | AZ-A | $(hostname -f)</h1>" > /var/www/html/index.html
      Tags:
        - { Key: Name,        Value: !Sub '${Environment}-webapp-ec2-web-1a' }
        - { Key: Environment, Value: !Ref Environment }
        - { Key: Project,     Value: webapp }
        - { Key: ManagedBy,   Value: CloudFormation }
        - { Key: Layer,       Value: compute }

  Ec2WebServer1c:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile:
        Fn::ImportValue: !Sub '${SecurityStackName}-IamInstanceProfileEc2Name'
      SubnetId:
        Fn::ImportValue: !Sub '${NetworkingStackName}-SubnetPrivate1cId'
      SecurityGroupIds:
        - Fn::ImportValue: !Sub '${SecurityStackName}-SecurityGroupEc2Id'
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>${Environment} | webapp | AZ-C | $(hostname -f)</h1>" > /var/www/html/index.html
      Tags:
        - { Key: Name,        Value: !Sub '${Environment}-webapp-ec2-web-1c' }
        - { Key: Environment, Value: !Ref Environment }
        - { Key: Project,     Value: webapp }
        - { Key: ManagedBy,   Value: CloudFormation }
        - { Key: Layer,       Value: compute }

  # ── ALB ───────────────────────────────────────────────────────────────────
  AlbMain:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${Environment}-webapp-alb-main'
      Scheme: internet-facing
      Type: application
      Subnets:
        - Fn::ImportValue: !Sub '${NetworkingStackName}-SubnetPublic1aId'
        - Fn::ImportValue: !Sub '${NetworkingStackName}-SubnetPublic1cId'
      SecurityGroups:
        - Fn::ImportValue: !Sub '${SecurityStackName}-SecurityGroupAlbId'
      Tags:
        - { Key: Name,        Value: !Sub '${Environment}-webapp-alb-main' }
        - { Key: Environment, Value: !Ref Environment }
        - { Key: Project,     Value: webapp }
        - { Key: ManagedBy,   Value: CloudFormation }
        - { Key: Layer,       Value: compute }

  # ── Target Group ──────────────────────────────────────────────────────────
  AlbTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${Environment}-webapp-tg-web'
      Port: 80
      Protocol: HTTP
      VpcId:
        Fn::ImportValue: !Sub '${NetworkingStackName}-VpcId'
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
        - { Key: deregistration_delay.timeout_seconds, Value: '20' }
      Targets:
        - { Id: !Ref Ec2WebServer1a, Port: 80 }
        - { Id: !Ref Ec2WebServer1c, Port: 80 }
      Tags:
        - { Key: Name,        Value: !Sub '${Environment}-webapp-tg-web' }
        - { Key: Environment, Value: !Ref Environment }
        - { Key: Project,     Value: webapp }
        - { Key: ManagedBy,   Value: CloudFormation }
        - { Key: Layer,       Value: compute }

  # ── Listeners ─────────────────────────────────────────────────────────────
  # HTTP :80 → redirect 301 to HTTPS
  AlbListenerHttp:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AlbMain
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  # HTTPS :443 → forward to target group
  AlbListenerHttps:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AlbMain
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref AcmCertificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AlbTargetGroup

  # ── Route53 A-record → ALB alias ──────────────────────────────────────────
  Route53RecordAlb:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub '${SubDomain}.${HostedZoneName}'
      Type: A
      AliasTarget:
        DNSName: !GetAtt AlbMain.DNSName
        EvaluateTargetHealth: true
        HostedZoneId: !GetAtt AlbMain.CanonicalHostedZoneID

Outputs:
  AlbDnsName:
    Value: !GetAtt AlbMain.DNSName
    Export: { Name: !Sub '${AWS::StackName}-AlbDnsName' }

  AppUrl:
    Value: !Sub 'https://${SubDomain}.${HostedZoneName}'
    Export: { Name: !Sub '${AWS::StackName}-AppUrl' }

  AcmCertificateArn:
    Value: !Ref AcmCertificate
    Export: { Name: !Sub '${AWS::StackName}-AcmCertificateArn' }
